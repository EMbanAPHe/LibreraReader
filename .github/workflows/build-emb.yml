name: Build Librera EMB

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;20.1.5948944" \
            "cmake;3.22.1" \
            --channel=0

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Write signing properties
        run: |
          cat >> app/gradle.properties <<EOF
          RELEASE_STORE_FILE=${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          librera_appGdriveKey=
          librera_admobAppId=
          librera_admobBannerId=
          librera_admobFullId=
          librera_admobRewardId=
          pro_appGdriveKey=
          pdf_classic_appGdriveKey=
          pdf_classic_admobAppId=
          pdf_classic_admobBannerId=
          pdf_classic_admobFullId=
          pdf_classic_admobRewardId=
          ebooka_appGdriveKey=
          ebooka_admobAppId=
          ebooka_admobBannerId=
          ebooka_admobFullId=
          ebooka_admobRewardId=
          pdf_v2_appGdriveKey=
          pdf_v2_admobAppId=
          pdf_v2_admobBannerId=
          pdf_v2_admobFullId=
          pdf_v2_admobRewardId=
          tts_reader_appGdriveKey=
          tts_reader_admobAppId=
          tts_reader_admobBannerId=
          tts_reader_admobFullId=
          tts_reader_admobRewardId=
          epub_reader_appGdriveKey=
          epub_reader_admobAppId=
          epub_reader_admobBannerId=
          epub_reader_admobFullId=
          epub_reader_admobRewardId=
          EOF

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build EMB Release APKs
        run: ./gradlew assembleEmbRelease --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p apk-out
          find app/build/outputs/apk/emb/release/ -name "*.apk" -exec cp {} apk-out/ \;

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreraEMB-arm64
          path: apk-out/*arm64*.apk
          retention-days: 30

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: LibreraEMB-universal
          path: apk-out/*uni*.apk
          retention-days: 30
